services:
  postgres:
    image: postgres:16-alpine
    container_name: tshirt_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tshirt_db
    volumes:
      - tshirt_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: tshirt_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - tshirt_redisdata:/data

volumes:
  tshirt_pgdata:
  tshirt_redisdata:
